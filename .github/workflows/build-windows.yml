name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows (VC${{ matrix.vs-version }} + ${{ matrix.cuda-version != '' && format('CUDA {0} + ', matrix.cuda-version) || '' }}Vulkan)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            vs-version: "17"
            cuda-version: "12.9.0"
          - os: windows-2025
            vs-version: "18"
            cuda-version: "13.2.0"
          - os: windows-2022
            vs-version: "17"
            cuda-version: ""
          - os: windows-2025
            vs-version: "18"
            cuda-version: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: "1.3.296.0"
          install_runtime: true
          install_development: true
          cache: true

      - name: Install CUDA Toolkit
        if: ${{ matrix.cuda-version != '' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda-version }}
          log-file-suffix: 'vc${{ matrix.vs-version }}-cuda${{ matrix.cuda-version }}.txt'

      - name: Prepare SPIRV-Headers CMake Config
        shell: pwsh
        run: |
          $configDir = "$PWD\cmake-configs\SPIRV-Headers"
          New-Item -ItemType Directory -Force -Path $configDir
          $configContent = @"
          add_library(SPIRV-Headers INTERFACE)
          target_include_directories(SPIRV-Headers INTERFACE "`$ENV{VULKAN_SDK}/Include")
          "@
          Set-Content -Path "$configDir\SPIRV-HeadersConfig.cmake" -Value $configContent
          echo "CMAKE_PREFIX_PATH_EXTRA=$PWD\cmake-configs" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: cmd
        run: |
          if exist build rmdir /s /q build
          mkdir build
          cd build
          if "${{ matrix.cuda-version }}"=="" (
            cmake .. -A x64 -DCMAKE_PREFIX_PATH="%VULKAN_SDK%;%CMAKE_PREFIX_PATH_EXTRA%" -DGGML_CPU_ALL_VARIANTS=ON -DGGML_VULKAN=ON -DGGML_BACKEND_DL=ON
          ) else (
            cmake .. -A x64 -DCMAKE_PREFIX_PATH="%VULKAN_SDK%;%CMAKE_PREFIX_PATH_EXTRA%" -DGGML_CPU_ALL_VARIANTS=ON -DGGML_CUDA=ON -DGGML_VULKAN=ON -DGGML_BACKEND_DL=ON
          )

      - name: Build Release
        shell: cmd
        run: |
          cd build
          cmake --build . --config Release -j %NUMBER_OF_PROCESSORS%

      - name: Prepare Release Artifacts
        shell: pwsh
        run: |
          $cudaSuffix = if ("${{ matrix.cuda-version }}" -ne "") { "-cuda${{ matrix.cuda-version }}" } else { "-nocuda" }
          $artifactName = "qwen-tts-windows-vc${{ matrix.vs-version }}$cudaSuffix-vulkan"
          New-Item -ItemType Directory -Force -Path "release\$artifactName"
          Copy-Item -Path "build\Release\*" -Destination "release\$artifactName\" -Recurse -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen-tts-windows-vc${{ matrix.vs-version }}${{ matrix.cuda-version != '' && format('-cuda{0}', matrix.cuda-version) || '-nocuda' }}-vulkan
          path: release/qwen-tts-windows-vc${{ matrix.vs-version }}${{ matrix.cuda-version != '' && format('-cuda{0}', matrix.cuda-version) || '-nocuda' }}-vulkan
          retention-days: 5

  publish-release:
    name: Publish Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Artifacts for Release
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "$name.zip" "$dir"
          done
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true